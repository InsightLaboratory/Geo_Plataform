<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <title>GeoPlatform Drillholes</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

  <div id="map"></div>

  <script>

    // -----------------------------
    // INIT MAP
    // -----------------------------
    const map = L.map('map').setView([-31.534, -68.536], 12)

    // -----------------------------
    // BASEMAP
    // -----------------------------
    L.tileLayer(
      'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }
    ).addTo(map)

    // -----------------------------
    // FETCH GEOJSON FROM API
    // -----------------------------
    fetch("https://geo-plataform.onrender.com/geospatial/drillhole-locations")

      .then(response => {
        if (!response.ok) {
          throw new Error("Error en la API")
        }
        return response.json()
      })

      .then(data => {

        console.log("GeoJSON recibido:", data)

        // -----------------------------
        // GEOJSON LAYER
        // -----------------------------
        const drillholes = L.geoJSON(data, {

          pointToLayer: (feature, latlng) => {
            return L.circleMarker(latlng, {
              radius: 6,
              color: "#000",
              weight: 1,
              fillColor: "#ff7800",
              fillOpacity: 0.9
            })
          },

          onEachFeature: (feature, layer) => {
            layer.bindPopup(
              `<b>Drillhole:</b> ${feature.properties.drillhole}`
            )
          }

        }).addTo(map)

        // -----------------------------
        // AUTO ZOOM
        // -----------------------------
        if (drillholes.getBounds().isValid()) {
          map.fitBounds(drillholes.getBounds())
        }

      })

      .catch(error => {
        console.error("Error:", error)
        alert("Error cargando datos desde la API")
      })

  </script>

</body>
</html>
